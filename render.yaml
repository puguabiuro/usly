services:
  - type: web
    name: usly-backend-2
    env: python
    branch: master
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && export PYTHONPATH=/opt/render/project/src:/opt/render/project/src/backend && alembic -c alembic.ini upgrade head && exec uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SENTRY_DSN
        value: "https://examplePublicKey@o0.ingest.sentry.io/0"
      - key: ENV
        value: "production"
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "1.0"
      - key: FRONTEND_ORIGIN
        value: "https://uslyapp.pl"
      - key: JWT_SECRET_KEY
        value: "supersecretkey123456789"
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: JWT_EXPIRES_MINUTES
        value: "60"
      - key: LOG_LEVEL
        value: "INFO"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_IMAGE_MODEL
        value: "gpt-image-1"
      - key: OPENAI_IMAGE_SIZE
        value: "1024x1024"
      - key: OPENAI_IMAGE_QUALITY
        value: "low"
      - key: OPENAI_MODERATION_MODEL
        value: "gpt-4.1-mini"
